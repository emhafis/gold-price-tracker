name: Bot Pantau Emas

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  eksekusi:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Ambil Kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Jalankan Skrip Update
        run: node update_gold.js

      - name: Simpan Perubahan
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add harga_emas.csv
          git commit -m "Update harga emas harian [skip ci]" || exit 0
          git push